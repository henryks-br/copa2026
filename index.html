<html lang="pt-BR">

<title>Álbum Copa 2026 – Figurinhas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --verde:#1a6b2f;--verde-claro:#27a344;--dourado:#f5c518;
    --dourado-escuro:#c9a000;--bg:#0d1b10;--card-bg:#152019;
    --card-border:#2a4030;--text:#e8f5ec;--muted:#7aaa88;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:linear-gradient(135deg,#0a3d1a 0%,#1a6b2f 50%,#0a3d1a 100%);border-bottom:3px solid var(--dourado);padding:16px;text-align:center;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.5);}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,5vw,2.5rem);color:var(--dourado);letter-spacing:3px;line-height:1;}
  header p{color:#aad4b4;font-size:.8rem;margin-top:3px;font-weight:600;}
  .stats-bar{display:flex;justify-content:center;gap:20px;margin-top:8px;}
  .stat{text-align:center;font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
  .stat span{display:block;font-size:1.2rem;color:var(--dourado);font-family:'Bebas Neue',sans-serif;}
  .progress-bar{height:4px;background:#1e3a25;margin:8px 16px 0;border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--verde-claro),var(--dourado));transition:width .4s ease;}
  .search-wrap{padding:12px 16px 8px;max-width:700px;margin:0 auto;}
  .search-row{display:flex;gap:8px;align-items:center;}
  .search-row .search-input{flex:1;}
  .search-input{width:100%;padding:11px 14px;background:var(--card-bg);border:2px solid var(--card-border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--dourado);}
  .search-input::placeholder{color:var(--muted);}

  .filter-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;padding:0 16px;max-width:700px;margin-left:auto;margin-right:auto;}
  .filter-btn{padding:5px 12px;border-radius:18px;border:1.5px solid var(--card-border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;}
  .filter-btn.active,.filter-btn:hover{background:var(--verde-claro);border-color:var(--verde-claro);color:white;}
  .section-label{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--dourado);letter-spacing:2px;padding:8px 16px 4px;max-width:700px;margin:0 auto;border-bottom:1px solid #2a4030;}
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:8px 16px 16px;max-width:700px;margin:0 auto;}
  .team-card{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:12px;padding:12px 10px 10px;cursor:pointer;transition:all .2s;position:relative;user-select:none;}
  .team-card:hover{border-color:var(--verde-claro);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4);}
  .team-card.done{border-color:#27a344;background:#0e2b16;}
  .team-flag{font-size:1.8rem;display:block;margin-bottom:5px;}
  .team-name{font-size:.8rem;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:3px;}
  .team-grupo{font-size:.65rem;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:5px;}
  .team-progress{font-size:.7rem;color:var(--muted);font-weight:700;}
  .team-progress b{color:var(--dourado);}
  .team-card.done .team-progress b{color:#27a344;}
  .badge-done{position:absolute;top:7px;right:8px;font-size:.85rem;color:#27a344;}
  .hint{text-align:center;color:var(--muted);font-size:.72rem;padding:4px 16px 10px;font-weight:600;}
  .empty-msg{grid-column:1/-1;text-align:center;padding:32px;color:var(--muted);font-weight:700;}
  /* DROPDOWN BUSCA UNIFICADA */
  #search-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card-bg);border:2px solid var(--dourado);border-radius:12px;z-index:400;max-height:70vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6);}
  #search-dropdown.open{display:block;}
  .dd-section{padding:6px 12px 2px;font-family:'Bebas Neue',sans-serif;font-size:.8rem;color:var(--muted);letter-spacing:2px;border-bottom:1px solid #1e3a25;}
  .dd-team{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .15s;}
  .dd-team:hover,.dd-team.active{background:#1e3a25;}
  .dd-team-flag{font-size:1.5rem;flex-shrink:0;}
  .dd-team-info{flex:1;min-width:0;}
  .dd-team-name{font-size:.85rem;font-weight:800;color:var(--text);}
  .dd-team-sub{font-size:.68rem;color:var(--muted);font-weight:600;}
  .dd-team-prog{font-size:.7rem;font-weight:700;color:var(--dourado);flex-shrink:0;}
  .dd-player{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .15s;}
  .dd-player:hover,.dd-player.active{background:#1e3a25;}
  .dd-player-flag{font-size:1.1rem;flex-shrink:0;}
  .dd-player-info{flex:1;min-width:0;}
  .dd-player-name{font-size:.83rem;font-weight:800;color:var(--text);}
  .dd-player-sub{font-size:.68rem;color:var(--muted);font-weight:600;}
  .dd-player-right{text-align:right;flex-shrink:0;}
  .dd-player-code{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--dourado);display:block;}
  .dd-player-status{font-size:.65rem;font-weight:800;}
  .dd-empty{padding:16px 12px;text-align:center;color:var(--muted);font-size:.82rem;font-weight:700;}
  .dd-divider{height:1px;background:#1e3a25;margin:2px 0;}
  /* DETALHE */
  #detail-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;}
  .detail-header{background:linear-gradient(135deg,#0a3d1a,#1a6b2f,#0a3d1a);border-bottom:3px solid var(--dourado);padding:14px 16px;position:sticky;top:0;z-index:10;}
  .back-btn{background:none;border:none;color:var(--dourado);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1.5px;cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:8px;}
  .detail-title{display:flex;align-items:center;gap:10px;}
  .detail-flag{font-size:2.2rem;}
  .detail-info h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--dourado);letter-spacing:2px;line-height:1;}
  .detail-info p{color:var(--muted);font-size:.75rem;font-weight:700;}
  .detail-progress{margin-top:8px;}
  .detail-progress-bar{height:6px;background:#1e3a25;border-radius:3px;overflow:hidden;}
  .detail-progress-fill{height:100%;background:linear-gradient(90deg,var(--verde-claro),var(--dourado));transition:width .3s;}
  .detail-progress-label{font-size:.7rem;color:var(--muted);font-weight:700;margin-top:3px;}
  .stickers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;padding:12px 16px 24px;}
  .sticker-btn{background:var(--card-bg);border:2px solid var(--card-border);border-radius:12px;padding:0;cursor:pointer;transition:all .25s;text-align:left;width:100%;font-family:'Nunito',sans-serif;color:var(--text);position:relative;overflow:hidden;display:flex;flex-direction:column;}
  .sticker-btn:hover{border-color:var(--verde-claro);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5);}
  .sticker-btn.colada{border-color:#27a344;}
  .sticker-photo{width:100%;aspect-ratio:1/1;object-fit:cover;object-position:top center;display:block;transition:filter .4s ease;filter:grayscale(100%) brightness(.75);}
  .sticker-btn.colada .sticker-photo{filter:grayscale(0%) brightness(1);}
  .sticker-fallback{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:2.4rem;background:linear-gradient(135deg,#0e2b16,#152019);}
  .sticker-footer{padding:7px 8px 8px;flex:1;display:flex;flex-direction:column;gap:2px;}
  .sticker-num{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--muted);letter-spacing:1px;display:block;line-height:1;}
  .sticker-btn.colada .sticker-num{color:#27a344;}
  .sticker-name{font-size:.73rem;font-weight:800;line-height:1.2;display:block;color:var(--text);}
  .sticker-type{font-size:.62rem;font-weight:700;display:block;margin-top:1px;}
  .sticker-badge{position:absolute;top:6px;right:6px;background:#27a344;color:white;border-radius:50%;width:20px;height:20px;display:none;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .sticker-btn.colada .sticker-badge{display:flex;}
  .mark-all-row{display:flex;gap:8px;padding:0 16px 4px;}
  .mark-btn{flex:1;padding:8px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .2s;}
  .mark-btn.mark-all{background:var(--verde-claro);color:white;}
  .mark-btn.unmark-all{background:#2a4030;color:var(--muted);}
  @media(max-width:400px){.teams-grid{grid-template-columns:repeat(2,1fr);}.stickers-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

    </div>
  </div>
  <div class="filter-row">

  <div id="list-container"></div>
</div>

<div id="detail-screen">

    <div class="detail-title">

      <div class="detail-info"><h2 id="d-name"></h2><p id="d-sub"></p></div>
    </div>
    <div class="detail-progress">
      <div class="detail-progress-bar"><div class="detail-progress-fill" id="d-prog-fill" style="width:0%"></div></div>
      <div class="detail-progress-label" id="d-prog-label"></div>
    </div>
  </div>
  <div class="mark-all-row">
    <button class="mark-btn mark-all" onclick="markAll(true)">✓ Marcar todas</button>
    <button class="mark-btn unmark-all" onclick="markAll(false)">✕ Desmarcar todas</button>
  </div>
  <div class="stickers-grid" id="stickers-grid"></div>
</div>

const TOTAL = TEAMS.length * 20;
const grupos = [...new Set(TEAMS.map(t=>t.grupo))];
const tColor={L:'#f5c518',F:'#8a6fff',G:'#3b9dde',D:'#e05c5c',M:'#27a344',A:'#f5a623'};
const tLabel={L:'ESCUDO',F:'FOTO',G:'GOL',D:'DEF',M:'MID',A:'ATA'};

let coladas = new Set(JSON.parse(localStorage.getItem('copa26_fig')||'[]'));
let filtro='todas', currentTeam=null;

function save(){localStorage.setItem('copa26_fig',JSON.stringify([...coladas]));}
function key(cod,n){return `${cod}_${n}`;}
function countTeam(t){return t.j.filter(j=>coladas.has(key(t.cod,j.n))).length;}
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}

function updateStats(){
  const n=coladas.size;
  document.getElementById('s-col').textContent=n;
  document.getElementById('s-tot').textContent=TOTAL;
  document.getElementById('s-pct').textContent=Math.round(n/TOTAL*100)+'%';
  document.getElementById('main-prog').style.width=(n/TOTAL*100)+'%';
}

function setFilter(f,btn){
  filtro=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(){
  const q=norm(document.getElementById('search').value);
  let html='';
  grupos.forEach(g=>{
    const isGrupo=filtro.length===1&&filtro>='A'&&filtro<='L';
    if(isGrupo&&g!==filtro)return;
    let lista=TEAMS.filter(t=>t.grupo===g);
    if(q)lista=lista.filter(t=>norm(t.nome).includes(q)||norm(t.cod).includes(q));
    if(filtro==='completas')lista=lista.filter(t=>countTeam(t)===20);
    if(filtro==='incompletas')lista=lista.filter(t=>countTeam(t)<20);
    if(!lista.length)return;
    html+=`<div class="section-label">GRUPO ${g}</div><div class="teams-grid">`;
    lista.forEach(t=>{
      const cnt=countTeam(t),done=cnt===20;
      html+=`<div class="team-card ${done?'done':''}" onclick="openDetail('${t.cod}')">
        ${done?'<span class="badge-done">✓</span>':''}
        <span class="team-flag">${t.flag}</span>
        <div class="team-name">${t.nome}</div>
        <div class="team-grupo">Grupo ${t.grupo} · Pág. ${t.pag}</div>
        <div class="team-progress"><b>${cnt}/20</b> figurinhas</div>
      </div>`;
    });
    html+='</div>';
  });
  if(!html)html='<div class="teams-grid"><div class="empty-msg">Nenhuma seleção encontrada</div></div>';
  document.getElementById('list-container').innerHTML=html;
  updateStats();
}

function openDetail(cod){
  currentTeam=cod;
  const t=TEAMS.find(x=>x.cod===cod);
  document.getElementById('d-flag').textContent=t.flag;
  document.getElementById('d-name').textContent=t.nome;
  document.getElementById('d-sub').textContent=`Grupo ${t.grupo} · Página ${t.pag} · 20 figurinhas`;
  renderDetail(t);
  document.getElementById('list-screen').style.display='none';
  document.getElementById('detail-screen').style.display='block';
  document.getElementById('detail-screen').scrollTop=0;
}

// gera slug para URL da foto do SofaScore
function playerSlug(nome){
  return nome.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s-]/g,'')
    .trim().replace(/\s+/g,'-');
}

// emoji de fallback por tipo
const tEmoji={L:'🛡️',F:'📸',G:'🧤',D:'🛡️',M:'⚡',A:'⚽'};

function stickerPhotoHTML(j, teamFlag){
  if(j.t==='L') return `<div class="sticker-fallback" style="font-size:3rem">${teamFlag}</div>`;
  if(j.t==='F') return `<div class="sticker-fallback">📸</div>`;
  const slug = playerSlug(j.nome);
  const fb = tEmoji[j.t] || '⚽';
  const safeAlt = j.nome.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  return `<img class="sticker-photo" src="" data-slug="${slug}" data-fb="${fb}" alt="${safeAlt}" loading="lazy">`;
}

function renderDetail(t){
  const cnt=countTeam(t);
  document.getElementById('d-prog-fill').style.width=(cnt/20*100)+'%';
  document.getElementById('d-prog-label').textContent=`${cnt} de 20 figurinhas coladas`;
  document.getElementById('stickers-grid').innerHTML=t.j.map(j=>{
    const done=coladas.has(key(t.cod,j.n));
    const pc=tColor[j.t]||'#7aaa88', pl=tLabel[j.t]||j.t;
    const safeName = j.nome.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    return `<button class="sticker-btn ${done?'colada':''}" onclick="toggleSticker('${t.cod}',${j.n})">
      <span class="sticker-badge">✓</span>
      ${stickerPhotoHTML(j, t.flag)}
      <div class="sticker-footer">
        <span class="sticker-num">${t.cod}${j.n}</span>
        <span class="sticker-name">${safeName}</span>
        <span class="sticker-type" style="color:${pc}">${pl}</span>
      </div>
    </button>`;
  }).join('');
  // carrega fotos reais via Wikipedia API
  loadPhotos(t);
}

// carrega fotos reais via Wikipedia — CORS aberto, gratuito
async function loadPhotos(t){
  const imgs = document.querySelectorAll('#stickers-grid .sticker-photo[data-slug]');
  if(!imgs.length) return;

  // set fallback handler for each img now (no inline onerror)
  imgs.forEach(img => {
    const fb = img.dataset.fb || '⚽';
    img.onerror = () => {
      img.onerror = null;
      const div = document.createElement('div');
      div.className = 'sticker-fallback';
      div.textContent = fb;
      img.replaceWith(div);
    };
  });

  // build name→img map (using original nome, not encoded alt)
  const nameToImg = {};
  t.j.forEach(j => {
    if(j.t==='L'||j.t==='F') return;
    nameToImg[j.nome] = null;
  });
  imgs.forEach(img => {
    // alt may be HTML-entity-encoded, decode it back
    const decoded = img.alt.replace(/&#39;/g,"'").replace(/&quot;/g,'"');
    if(nameToImg.hasOwnProperty(decoded)) nameToImg[decoded] = img;
  });

  // fetch thumbnails from Wikipedia in one batch request
  const nomes = Object.keys(nameToImg);
  if(!nomes.length) return;

  // Wikipedia accepts up to 50 titles per request
  const chunks = [];
  for(let i=0; i<nomes.length; i+=50) chunks.push(nomes.slice(i,i+50));

  for(const chunk of chunks){
    try {
      const titles = chunk.map(n=>encodeURIComponent(n)).join('|');
      const res = await fetch(
        `https://en.wikipedia.org/w/api.php?action=query&titles=${titles}&prop=pageimages&piprop=thumbnail&pithumbsize=220&format=json&origin=*`
      );
      const data = await res.json();
      const pages = data.query?.pages || {};
      Object.values(pages).forEach(page => {
        if(!page.thumbnail?.source) return;
        // match by exact title or normalised
        let imgEl = nameToImg[page.title];
        if(!imgEl){
          const normTitle = norm(page.title);
          const match = nomes.find(n => norm(n)===normTitle);
          if(match) imgEl = nameToImg[match];
        }
        if(imgEl) imgEl.src = page.thumbnail.source;
      });
    } catch(e){ /* silently fail */ }
  }

  // anything still with empty src gets the fallback emoji
  imgs.forEach(img => {
    if(!img.src || img.src === window.location.href) img.onerror?.();
  });
}

function toggleSticker(cod,n){
  const k=key(cod,n);
  coladas.has(k)?coladas.delete(k):coladas.add(k);
  save();
  const t=TEAMS.find(x=>x.cod===cod);
  renderDetail(t);
  updateStats();
}

function markAll(mark){
  const t=TEAMS.find(x=>x.cod===currentTeam);
  t.j.forEach(j=>{const k=key(t.cod,j.n);mark?coladas.add(k):coladas.delete(k);});
  save();renderDetail(t);updateStats();
}

function closeDetail(){
  document.getElementById('detail-screen').style.display='none';
  document.getElementById('list-screen').style.display='block';
  renderList();
}

// BUSCA UNIFICADA
let ddActiveIdx = -1;

function onSearch(){
  const q = document.getElementById('search').value;
  ddActiveIdx = -1;
  if(norm(q).length < 1){ closeDropdown(); renderList(); return; }
  renderList(); // filtra seleções na grade normalmente
  showDropdown(q);
}

function onSearchKey(e){
  const dd = document.getElementById('search-dropdown');
  const items = dd.querySelectorAll('.dd-team, .dd-player');
  if(e.key === 'Escape'){ closeDropdown(); return; }
  if(e.key === 'ArrowDown'){ e.preventDefault(); moveDd(items, 1); return; }
  if(e.key === 'ArrowUp'){ e.preventDefault(); moveDd(items, -1); return; }
  if(e.key === 'Enter' && ddActiveIdx >= 0){ e.preventDefault(); items[ddActiveIdx]?.click(); return; }
}

function moveDd(items, dir){
  items.forEach(i=>i.classList.remove('active'));
  ddActiveIdx = Math.max(0, Math.min(items.length-1, ddActiveIdx + dir));
  items[ddActiveIdx]?.classList.add('active');
  items[ddActiveIdx]?.scrollIntoView({block:'nearest'});
}

function showDropdown(q){
  const nq = norm(q);
  const dd = document.getElementById('search-dropdown');

  // seleções que batem
  const teamMatches = TEAMS.filter(t =>
    norm(t.nome).includes(nq) || norm(t.cod).includes(nq)
  ).slice(0, 5);

  // jogadores que batem (excluindo Logo/Foto)
  const playerMatches = [];
  TEAMS.forEach(team => {
    team.j.forEach(j => {
      if(j.t !== 'L' && j.t !== 'F' && norm(j.nome).includes(nq))
        playerMatches.push({team, j});
    });
  });
  const players = playerMatches.slice(0, 8);

  if(!teamMatches.length && !players.length){
    dd.innerHTML = '<div class="dd-empty">Nenhum resultado encontrado</div>';
    dd.classList.add('open'); return;
  }

  let html = '';

  if(teamMatches.length){
    html += '<div class="dd-section">SELEÇÕES</div>';
    html += teamMatches.map(t => {
      const cnt = countTeam(t);
      return `<div class="dd-team" onclick="closeDropdown();openDetail('${t.cod}')">
        <span class="dd-team-flag">${t.flag}</span>
        <div class="dd-team-info">
          <div class="dd-team-name">${t.nome}</div>
          <div class="dd-team-sub">Grupo ${t.grupo} · Página ${t.pag}</div>
        </div>
        <span class="dd-team-prog">${cnt}/20</span>
      </div>`;
    }).join('');
  }

  if(players.length){
    if(teamMatches.length) html += '<div class="dd-divider"></div>';
    html += '<div class="dd-section">JOGADORES</div>';
    html += players.map(({team, j}) => {
      const done = coladas.has(key(team.cod, j.n));
      const pc = tColor[j.t]||'#7aaa88', pl = tLabel[j.t]||j.t;
      return `<div class="dd-player" onclick="closeDropdown();goToPlayer('${team.cod}',${j.n})">
        <span class="dd-player-flag">${team.flag}</span>
        <div class="dd-player-info">
          <div class="dd-player-name">${j.nome}</div>
          <div class="dd-player-sub">${team.nome} · <span style="color:${pc}">${pl}</span> · Pág.${team.pag}</div>
        </div>
        <div class="dd-player-right">
          <span class="dd-player-code">${team.cod}${j.n}</span>
          <span class="dd-player-status" style="color:${done?'#27a344':'#f5c518'}">${done?'✓':'⬜'}</span>
        </div>
      </div>`;
    }).join('');
    if(playerMatches.length > 8){
      html += `<div class="dd-empty" style="font-size:.72rem">+${playerMatches.length-8} resultados — refine a busca</div>`;
    }
  }

  dd.innerHTML = html;
  dd.classList.add('open');
}

function closeDropdown(){
  document.getElementById('search-dropdown').classList.remove('open');
  ddActiveIdx = -1;
}

// fecha dropdown ao clicar fora
document.addEventListener('click', e => {
  if(!e.target.closest('.search-wrap')) closeDropdown();
});

function goToPlayer(cod,n){
  openDetail(cod);
  setTimeout(()=>{
    document.querySelectorAll('.sticker-btn').forEach(btn=>{
      if(btn.querySelector('.sticker-num')?.textContent===`${cod}${n}`){
        btn.scrollIntoView({behavior:'smooth',block:'center'});
        btn.style.outline='3px solid var(--dourado)';
        setTimeout(()=>btn.style.outline='',2500);
      }
    });
  },150);
}

renderList();updateStats();
